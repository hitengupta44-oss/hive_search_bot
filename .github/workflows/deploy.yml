name: Deploy to hiverift.com
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy
        run: |
          cd /home/hiveriftmain/nextapp
          git pull origin main
          npm install
          rm -rf .next
          npm run build
          cp /home/hiveriftmain/nextapp/.htaccess /home/hiveriftmain/public_html/.htaccess
          sudo /bin/pm2 restart hiverift
          sudo /bin/pm2 save